services:

  # ── Node.js ────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node_app
    volumes:
      - ./app:/app                   # código fuente en ./app del host
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
      - "8081:8081"
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: user
      DB_PASSWORD: user
      DB_NAME: devdb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dev_net
    restart: no

  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:latest
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mrfinance
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev_net
    restart: no

  # ── phpMyAdmin ─────────────────────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyAdmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dev_net
    restart: no

# ── Volúmenes ─────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  node_modules:

# ── Red interna ───────────────────────────────────────────────────────────────
networks:
  dev_net:
    driver: bridge
